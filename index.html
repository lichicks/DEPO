<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEPO Studio</title>
    
    <link rel="icon" type="image/png" href="ikona.png">
    <link rel="apple-touch-icon" href="ikona.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* MODERNÍ DESIGN PROMĚNNÉ - GLASSMORPHISM 2.0 */
        :root {
            --bg-dark: #050505; 
            --bg-light-dark: #1c1c1e; 
            --bg-card: rgba(30, 30, 32, 0.45);
            --bg-nav: rgba(20, 20, 22, 0.85); 
            --bg-input: rgba(255, 255, 255, 0.05);
            
            --border-glass: 1px solid rgba(255, 255, 255, 0.08);
            --border-highlight: 1px solid rgba(255, 255, 255, 0.15);
            
            --color-text: #f5f5f7;
            --color-text-muted: #8e8e93;
            --color-accent: #ffffff;
            
            --color-green: #30d158;
            --color-red: #ff453a;
            --color-blue: #0a84ff;
            --color-yellow: #ffd60a;
            
            --radius-card: 28px;
            --radius-input: 16px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at top left, var(--bg-light-dark) 0%, var(--bg-dark) 80%);
            background-attachment: fixed; color: var(--color-text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            line-height: 1.5; padding-bottom: 8rem; min-height: 100vh; overflow-x: hidden; width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        /* ZÁMEK A SPLASH */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #login-screen h1 { color: #fff; font-size: 3.5rem; font-weight: 900; letter-spacing: 0.05em; margin-bottom: 20px; }
        .login-select, #login-password { width: 80%; max-width: 300px; padding: 18px; border-radius: var(--radius-input); border: var(--border-glass); outline: none; background: var(--bg-input); color: #fff; text-align: center; margin-bottom: 15px; font-size: 16px; letter-spacing: 0.1em; transition: border 0.3s; }
        .login-select { letter-spacing: normal; cursor: pointer; appearance: none; }
        #login-password:focus, .login-select:focus { border-color: var(--color-accent); }
        .btn-login { width: 80%; max-width: 300px; padding: 16px; background: #fff; color: #000; font-weight: 700; border-radius: var(--radius-input); border: none; cursor: pointer; transition: transform 0.1s; }
        .btn-login:active { transform: scale(0.97); }

        /* ROZVRŽENÍ A HLAVIČKA S LIVE PRESENCE */
        .container { width: 100%; max-width: 440px; margin: 0 auto; padding: 1.5rem 1rem; display: none; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; padding-bottom: 1rem; }
        .app-title { font-size: 2rem; font-weight: 800; margin: 0; letter-spacing: 0.02em; line-height: 1; }
        .app-subtitle { font-size: 0.8rem; color: var(--color-text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; margin-top: 6px; }
        
        /* MAC-OS STYLE LIVE PRESENCE */
        .presence-container { display: flex; gap: 8px; background: var(--bg-input); padding: 6px 10px; border-radius: 20px; border: var(--border-glass); backdrop-filter: blur(10px); }
        .presence-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; transition: all 0.4s ease; box-shadow: inset 0 0 4px rgba(0,0,0,0.5); }
        .presence-dot.online { background: var(--color-green); color: #000; box-shadow: 0 0 10px rgba(48,209,88,0.6); }

        /* KARTY */
        .card { width: 100%; background: var(--bg-card); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: var(--border-glass); border-radius: var(--radius-card); padding: 1.5rem; margin-bottom: 1.2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .card-title { font-size: 0.85rem; font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.05em; }

        /* OSTRŮVKOVÁ NAVIGACE (Pill Design) */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 400px; background: var(--bg-nav); backdrop-filter: saturate(180%) blur(40px); -webkit-backdrop-filter: saturate(180%) blur(40px); border: var(--border-glass); border-radius: 40px; display: flex; justify-content: space-between; padding: 6px; z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .nav-item { flex: 1; background: none; border: none; color: var(--color-text-muted); font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-weight: 600; padding: 8px 0; border-radius: 30px; transition: all 0.3s ease; }
        .nav-item svg { fill: currentColor; width: 22px; height: 22px; transition: transform 0.3s ease; }
        .nav-item.active { background: rgba(255, 255, 255, 0.1); color: var(--color-accent); }
        .nav-item.active svg { transform: translateY(-2px); }

        /* INPUTY A TLAČÍTKA */
        input, select, textarea { width: 100%; max-width: 100%; background: var(--bg-input); border: var(--border-glass); border-radius: var(--radius-input); padding: 14px 16px; color: #fff; font-size: 16px; margin-bottom: 12px; font-family: -apple-system, sans-serif; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { border: var(--border-highlight); background: rgba(255,255,255,0.08); outline: none; }
        
        .btn-add { width: 100%; background: #fff; color: #000; font-weight: 700; font-size: 0.95rem; padding: 16px; border-radius: var(--radius-input); border: none; cursor: pointer; margin-top: 5px; text-align: center; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        .btn-add:active { transform: scale(0.97); box-shadow: none; }
        .form-row { display: flex; gap: 0.8rem; width: 100%; }
        .form-row > * { flex: 1; min-width: 0; }

        /* FINANCE A VÝSLEDKY */
        .balance-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; }
        .balance-box { flex: 1 1 30%; min-width: 85px; background: var(--bg-input); border: var(--border-glass); border-radius: 18px; padding: 14px; text-align: center; }
        .balance-name { font-size: 0.75rem; color: var(--color-text-muted); margin-bottom: 4px; font-weight: 600; }
        .balance-val { font-size: 1.1rem; font-weight: 700; }
        .val-pos { color: var(--color-red); } 
        .val-neg { color: var(--color-green); }

        /* TO-DO LIST (FIX VERTICAL TEXT BUG) */
        .todo-item { display: flex; align-items: center; gap: 12px; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); width: 100%; }
        .todo-item:last-child { border-bottom: none; }
        .todo-content { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .todo-title { color: #fff !important; font-size: 1rem; font-weight: 500; margin: 0; width: 100%; overflow-wrap: anywhere; word-break: normal; line-height: 1.4; }
        .todo-done-text { text-decoration: line-through; opacity: 0.4; }
        .btn-del { background: rgba(255,69,58,0.15); border: 1px solid rgba(255,69,58,0.3); color: var(--color-red); border-radius: 10px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; }
        
        .todo-tabs { display: flex; gap: 8px; margin-bottom: 1rem; width: 100%; }
        .todo-tab { flex: 1; padding: 12px; background: var(--bg-input); border: var(--border-glass); border-radius: 16px; color: var(--color-text-muted); cursor: pointer; text-align: center; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
        .todo-tab.active { background: #fff; color: #000; box-shadow: 0 4px 10px rgba(255,255,255,0.15); border-color: #fff; }

        /* BĚŽNÉ SEZNAMY (Finance atd) */
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); width: 100%; }
        .list-item:last-child { border-bottom: none; }
        .item-icon { width: 44px; height: 44px; border-radius: 14px; background: var(--bg-input); border: var(--border-glass); display: flex; align-items: center; justify-content: center; margin-right: 1rem; flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; margin-right: 10px; }
        .item-title { font-size: 1rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
        .item-sub { font-size: 0.8rem; color: var(--color-text-muted); margin-top: 4px; }
        .item-amount { font-weight: 700; font-size: 1.05rem; text-align: right; white-space: nowrap; flex-shrink: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>DEPO</h1>
        <select id="login-user" class="login-select">
            <option value="" disabled selected>Kdo se přihlašuje?</option>
            <option value="Jenda">Jenda</option>
            <option value="Maty">Maty</option>
            <option value="Dominik">Dominik</option>
        </select>
        <input type="password" id="login-password" placeholder="••••••••">
        <button id="btn-submit" class="btn-login" onclick="verifyPassword()">ODEMKNOUT</button>
    </div>

    <div class="container" id="app-container">
        <div class="header">
            <div>
                <h1 class="app-title">DEPO</h1>
                <p class="app-subtitle">Dnes je <span id="today-date" style="color:var(--color-accent);"></span></p>
            </div>
            <div class="presence-container">
                <div class="presence-dot" id="pres-jenda" title="Jenda">J</div>
                <div class="presence-dot" id="pres-maty" title="Maty">M</div>
                <div class="presence-dot" id="pres-dominik" title="Dominik">D</div>
            </div>
        </div>

        <div id="view-booking">
            <div class="card">
                <h2 class="card-title">Seznam rezervací</h2>
                <div id="admin-list"><div style="text-align: center; color: var(--color-text-muted);">Načítám data...</div></div>
            </div>
        </div>

        <div id="view-finance" class="hidden">
            <div class="card">
                <h2 class="card-title" style="text-align: center;">Zůstatky studia</h2>
                <div class="balance-grid">
                    <div class="balance-box"><p class="balance-name">Jenda</p><p class="balance-val" id="debt-jenda">0</p></div>
                    <div class="balance-box"><p class="balance-name">Maty</p><p class="balance-val" id="debt-maty">0</p></div>
                    <div class="balance-box"><p class="balance-name">Dominik</p><p class="balance-val" id="debt-dominik">0</p></div>
                    <div class="balance-box"><p class="balance-name">Nikolas</p><p class="balance-val" id="debt-nikolas">0</p></div>
                    <div class="balance-box"><p class="balance-name">Filip</p><p class="balance-val" id="debt-filip">0</p></div>
                </div>
                <p style="font-size: 0.75rem; color: var(--color-text-muted); text-align: center; margin-top: 1rem; line-height: 1.4;">
                    <span style="color:var(--color-red);">Červená</span> = Dluží do studia.<br><span style="color:var(--color-green);">Zelená</span> = Přeplatek / Investice.
                </p>
            </div>

            <div class="card">
                <h2 class="card-title">Zapsat novou transakci</h2>
                <input type="text" id="pur-name" placeholder="Co se koupilo / Účel vkladu">
                <div class="form-row">
                    <input type="number" id="pur-amount" placeholder="Částka (Kč)">
                    <select id="pur-icon">
                        <option value="audio">🎙️ Vybavení</option>
                        <option value="other">💳 Ostatní / Vklad</option>
                    </select>
                </div>
                <div class="form-row">
                    <select id="pur-paidBy">
                        <option value="" disabled selected>Kdo to platil?</option>
                        <option value="Jenda">Jenda</option><option value="Maty">Maty</option>
                        <option value="Dominik">Dominik</option><option value="Nikolas">Nikolas</option>
                        <option value="Filip">Filip</option>
                    </select>
                    <select id="pur-split">
                        <option value="all">Nákup: Rozdělit na 5 (Všichni)</option>
                        <option value="core">Nákup: Rozdělit na 3 (J, M, D)</option>
                        <option value="vklad">Osobní vklad / Splátka dluhu</option>
                    </select>
                </div>
                <button class="btn-add" onclick="addPurchase()">Uložit transakci</button>
            </div>
            
            <div class="card"><h2 class="card-title">Historie transakcí</h2><div id="purchases-list"></div></div>
        </div>

        <div id="view-invoices" class="hidden">
            <div class="card">
                <h2 class="card-title">Fakturace</h2>
                <p style="color: var(--color-text-muted); text-align: center;">Sekce fakturace.</p>
            </div>
        </div>

        <div id="view-todos" class="hidden">
            <div class="card">
                <h2 class="card-title">Nový úkol</h2>
                <input type="text" id="todo-title" placeholder="Co je potřeba udělat...">
                <button class="btn-add" onclick="addTodo()">Uložit úkol</button>
            </div>
            
            <div class="todo-tabs">
                <div id="tab-active" class="todo-tab active" onclick="setTodoFilter('active')">Aktivní</div>
                <div id="tab-done" class="todo-tab" onclick="setTodoFilter('done')">Hotové</div>
            </div>

            <div class="card">
                <div id="todos-list"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('booking', this)">
                <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>Booking
            </button>
            <button class="nav-item" onclick="switchTab('finance', this)">
                <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>Finance
            </button>
            <button class="nav-item" onclick="switchTab('invoices', this)">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>Faktury
            </button>
            <button class="nav-item" onclick="switchTab('todos', this)">
                <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>Úkoly
            </button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://woyyoirqflacdddxziwv.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndveXlvaXJxZmxhY2RkZHh6aXd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTI0ODMsImV4cCI6MjA5NTE4ODQ4M30.dmIqJqHC5LUuEFYtDP0aiFeZ-lhRXz9ucXq9uFax7eo';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let data = { purchases: [], todos: [] };
        let currentTodoFilter = 'active';
        let loggedUser = null;

        // MATEMATICKÝ ZÁKLAD DLE TVÉHO ZADÁNÍ
        const baselineEquipDebt = { Jenda: -46440, Maty: -2270, Dominik: 11366, Nikolas: 20127, Filip: 13397 };

        document.getElementById('today-date').innerText = new Date().toLocaleDateString('cs-CZ');

        async function verifyPassword() {
            const userSelect = document.getElementById('login-user').value;
            const input = document.getElementById('login-password').value;
            if(!userSelect) return alert("Vyber, kdo se přihlašuje!");
            
            const btn = document.getElementById('btn-submit'); btn.innerText = "Ověřuji...";
            const { error } = await db.auth.signInWithPassword({ email: 'jan.lichy.w@gmail.com', password: input });
            
            if (error) { 
                alert("Zámek: " + error.message); 
                document.getElementById('login-password').value = ""; 
                btn.innerText = "ODEMKNOUT"; 
            } else { 
                localStorage.setItem('depo_user', userSelect);
                location.reload(); 
            }
        }

        async function startApp() {
            loggedUser = localStorage.getItem('depo_user');
            if(!loggedUser) { db.auth.signOut(); location.reload(); return; }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            
            await loadAllData(); 
            updateUI(); 
            
            // Spuštění Live Presence (každou minutu se aktualizuje)
            pingPresence();
            setInterval(pingPresence, 60000);
        }

        async function loadAllData() {
            try {
                const [pReq, tReq] = await Promise.all([
                    db.from('purchases').select('*').order('id', { ascending: false }),
                    db.from('todos').select('*').order('id', { ascending: false })
                ]);
                if(pReq.data) data.purchases = pReq.data;
                if(tReq.data) data.todos = tReq.data;
            } catch (err) { console.error("Data load issue:", err); }
        }

        // --- LIVE PRESENCE LOGIC ---
        async function pingPresence() {
            if(loggedUser) {
                // Zapíšeme, že aktuální uživatel je online (Nezapomeň si vytvořit tabulku "presence")
                try {
                    await db.from('presence').upsert({ name: loggedUser, last_seen: new Date().toISOString() });
                } catch(e) { console.log("Presence table might not exist yet."); }
            }
            
            // Stáhneme aktivitu všech
            try {
                const { data: presData } = await db.from('presence').select('*');
                if(presData) {
                    const now = new Date();
                    ['Jenda', 'Maty', 'Dominik'].forEach(name => {
                        const person = presData.find(p => p.name === name);
                        const dot = document.getElementById(`pres-${name.toLowerCase()}`);
                        if(person && dot) {
                            const lastSeen = new Date(person.last_seen);
                            const diffMins = (now - lastSeen) / 1000 / 60;
                            if(diffMins < 5) dot.classList.add('online');
                            else dot.classList.remove('online');
                        }
                    });
                }
            } catch(e) {}
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.bottom-nav .nav-item').forEach(b => b.classList.remove('active')); 
            btnElement.classList.add('active');
            ['booking', 'finance', 'todos', 'invoices'].forEach(id => { document.getElementById(`view-${id}`).classList.add('hidden'); });
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function setTodoFilter(filter) {
            currentTodoFilter = filter;
            document.getElementById('tab-active').className = filter === 'active' ? 'todo-tab active' : 'todo-tab';
            document.getElementById('tab-done').className = filter === 'done' ? 'todo-tab active' : 'todo-tab';
            updateUI();
        }

        function updateUI() {
            // --- 1. RESPONSIVNÍ KALKULAČKA FINANCÍ ---
            let debts = { ...baselineEquipDebt };
            document.getElementById('purchases-list').innerHTML = '';
            
            data.purchases.forEach((p, idx) => {
                let splitMap = { 'all': 'Rozdělit na 5', 'core': 'Rozdělit na 3', 'vklad': 'Vklad / Splátka' };
                document.getElementById('purchases-list').innerHTML += `
                <div class="list-item">
                    <div class="item-info">
                        <p class="item-title">${p.name}</p>
                        <p class="item-sub">${p.paidBy} • ${splitMap[p.split] || 'Nerozdělovat'}</p>
                    </div>
                    <div style="text-align: right;">
                        <p class="item-amount" style="color:var(--color-accent);">${Math.round(p.amount)} Kč</p>
                        <button onclick="delData('purchases', ${idx})" style="background:none; border:none; color:var(--color-red); font-size:0.75rem; cursor:pointer; margin-top:5px;">Smazat</button>
                    </div>
                </div>`;
                
                // Matematika přičítání a ODEČÍTÁNÍ VKLADU
                if (p.split === 'all') {
                    if(debts[p.paidBy] !== undefined) debts[p.paidBy] -= p.amount; 
                    let share = p.amount / 5; ['Jenda', 'Maty', 'Dominik', 'Nikolas', 'Filip'].forEach(n => debts[n] += share); 
                } else if (p.split === 'core') {
                    if(debts[p.paidBy] !== undefined) debts[p.paidBy] -= p.amount; 
                    let share = p.amount / 3; ['Jenda', 'Maty', 'Dominik'].forEach(n => debts[n] += share); 
                } else if (p.split === 'vklad') {
                    // Pokud je to vklad, tak se dluh člověka, co peníze vložil, sníží.
                    if(debts[p.paidBy] !== undefined) debts[p.paidBy] -= p.amount; 
                }
            });

            // Vykreslení zůstatků (Když vloží 1000, dluh se mu sníží)
            ['Jenda', 'Maty', 'Dominik', 'Nikolas', 'Filip'].forEach(name => { 
                let diff = Math.round(debts[name]); let el = document.getElementById(`debt-${name.toLowerCase()}`); 
                if(el) { el.innerText = Math.abs(diff) + " Kč"; el.className = 'balance-val ' + (diff > 0 ? 'val-pos' : (diff < 0 ? 'val-neg' : '')); if(diff === 0) el.style.color = 'var(--color-text)'; }
            });

            // --- 2. OPRAVENÝ TO-DO LIST ---
            document.getElementById('todos-list').innerHTML = '';
            let filteredTodos = data.todos.filter(t => currentTodoFilter === 'done' ? t.is_done : !t.is_done);
            if(filteredTodos.length === 0) document.getElementById('todos-list').innerHTML = '<div style="text-align:center; color:var(--color-text-muted); padding: 10px;">Žádné úkoly</div>';
            
            filteredTodos.forEach(t => {
                let idx = data.todos.findIndex(dt => dt.id === t.id);
                document.getElementById('todos-list').innerHTML += `
                <div class="todo-item">
                    <input type="checkbox" ${t.is_done ? 'checked' : ''} onchange="toggleTodo(${idx}, this.checked)">
                    <div class="todo-content">
                        <span class="todo-title ${t.is_done ? 'todo-done-text' : ''}">${t.title}</span>
                    </div>
                    <button class="btn-del" onclick="delData('todos', ${idx})">×</button>
                </div>`;
            });
        }

        async function addPurchase() {
            let name = document.getElementById('pur-name').value; let amount = parseFloat(document.getElementById('pur-amount').value); let icon = document.getElementById('pur-icon').value; let paidBy = document.getElementById('pur-paidBy').value; let split = document.getElementById('pur-split').value;
            if(!name || !amount || !paidBy) return alert("Vyplň všechny údaje!");
            const { error } = await db.from('purchases').insert([{ name: name, amount: Math.round(amount), icon: icon, paid_by: paidBy, split: split }]);
            if(!error) { document.getElementById('pur-name').value = ''; document.getElementById('pur-amount').value = ''; await loadAllData(); updateUI(); }
        }

        async function addTodo() {
            let title = document.getElementById('todo-title').value; 
            if(!title) return; 
            const { error } = await db.from('todos').insert([{ title: title, category: 'ostatni', is_done: false }]);
            if(!error) { document.getElementById('todo-title').value = ''; await loadAllData(); updateUI(); }
        }

        async function toggleTodo(idx, isDone) { 
            const item = data.todos[idx]; 
            await db.from('todos').update({ is_done: isDone }).eq('id', item.id); 
            await loadAllData(); updateUI(); 
        }

        async function delData(type, index) {
            if(confirm("Opravdu smazat z databáze?")) { 
                let item = data[type][index]; 
                if(item && item.id) { await db.from(type).delete().eq('id', item.id); await loadAllData(); updateUI(); } 
            }
        }

        window.onload = async () => {
            const { data: { session } } = await db.auth.getSession();
            if (session) { startApp(); }
        }
    </script>
</body>
</html>
