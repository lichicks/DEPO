<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEPO Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000000; --surface: #1c1c1e; --primary: #32d74b; --text: #ffffff; --text-sec: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; padding-bottom: 90px; }
        h1 { text-align: center; margin: 25px 0 15px 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; }
        
        /* Spodní navigace */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--text-sec); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        
        /* Přepínání sekcí */
        .section { display: none; padding: 0 20px; }
        .section.active { display: block; }
        
        /* Karty a formuláře */
        .card { background: var(--surface); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { font-size: 18px; margin-top: 0; margin-bottom: 15px; color: var(--primary); }
        input, button { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; border: none; box-sizing: border-box; font-size: 16px; }
        input { background: #2c2c2e; color: var(--text); outline: none; }
        input:focus { border: 1px solid var(--primary); }
        button { background: var(--primary); color: #000; font-weight: bold; cursor: pointer; }
        
        /* Seznamy */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .list-item:last-child { border-bottom: none; }
        .status-btn { width: auto; padding: 10px 15px; margin: 0; font-size: 14px; }
    </style>
</head>
<body>

    <h1>DEPO</h1>

    <div id="finances" class="section active">
        <div class="card">
            <h2>Nový výdaj</h2>
            <input type="text" id="itemName" placeholder="Za co se platilo? (např. Kabely)">
            <input type="number" id="itemPrice" placeholder="Cena v Kč" inputmode="numeric">
            <button onclick="addPurchase()">PŘIDAT DO CLOUDU</button>
        </div>
        <div class="card">
            <h2>Historie nákupů</h2>
            <div id="purchasesList">
                <div style="text-align: center; color: var(--text-sec);">Načítám data...</div>
            </div>
        </div>
    </div>

    <div id="booking" class="section">
        <div class="card">
            <h2>Nová rezervace</h2>
            <input type="date" id="bookDate">
            <input type="text" id="bookName" placeholder="Jméno klienta / Projekt">
            <div style="display: flex; gap: 10px;">
                <input type="number" id="bookStart" placeholder="Od (hod)" min="0" max="23">
                <input type="number" id="bookEnd" placeholder="Do (hod)" min="0" max="24">
            </div>
            <button onclick="addBooking()">REZERVOVAT</button>
        </div>
        <div class="card">
            <h2>Nadcházející sessions</h2>
            <div id="bookingsList">
                <div style="text-align: center; color: var(--text-sec);">Načítám data...</div>
            </div>
        </div>
    </div>

    <div id="rent" class="section">
        <div class="card">
            <h2>Stav nájmu (Tento měsíc)</h2>
            <div id="rentStatus">
                <div style="text-align: center; color: var(--text-sec);">Načítám data...</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchTab('finances', this)">Nákupy</div>
        <div class="nav-item" onclick="switchTab('booking', this)">Booking</div>
        <div class="nav-item" onclick="switchTab('rent', this)">Nájem</div>
    </div>

    <script>
        // Připojení k Supabase
        const supabaseUrl = 'https://woyyoirqflacdddxziwv.supabase.co';
        const supabaseKey = 'Sb_publishable_Vom-QZN0btlOMu55KbUDaw_ZvZPi2dT';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // UI Logika: Přepínání záložek
        function switchTab(tabId, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        // --- DATABÁZOVÁ LOGIKA: NÁKUPY ---
        async function loadPurchases() {
            const { data, error } = await supabase.from('purchases').select('*').order('id', { ascending: false });
            const list = document.getElementById('purchasesList');
            if (error) { list.innerHTML = 'Chyba načítání.'; return; }
            if (data.length === 0) { list.innerHTML = '<div style="text-align:center; color:#8e8e93;">Zatím žádné nákupy</div>'; return; }
            
            list.innerHTML = data.map(p => `
                <div class="list-item">
                    <span>${p.name}</span>
                    <strong style="color: var(--text);">${p.amount} Kč</strong>
                </div>
            `).join('');
        }

        async function addPurchase() {
            const name = document.getElementById('itemName').value;
            const amount = document.getElementById('itemPrice').value;
            if (!name || !amount) { alert("Musíš vyplnit co a za kolik!"); return; }

            const { error } = await supabase.from('purchases').insert([{ name, amount }]);
            if (!error) {
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                loadPurchases(); // Okamžitý refresh seznamu
            } else alert("Chyba: " + error.message);
        }

        // --- DATABÁZOVÁ LOGIKA: BOOKING ---
        async function loadBookings() {
            const { data, error } = await supabase.from('bookings').select('*').order('date', { ascending: true });
            const list = document.getElementById('bookingsList');
            if (error) { list.innerHTML = 'Chyba načítání.'; return; }
            if (data.length === 0) { list.innerHTML = '<div style="text-align:center; color:#8e8e93;">Žádné sessions v kalendáři</div>'; return; }
            
            list.innerHTML = data.map(b => `
                <div class="list-item" style="flex-direction: column; align-items: flex-start;">
                    <div style="color: var(--primary); font-size: 12px; font-weight: bold; margin-bottom: 4px;">${b.date} | ${b.start_hour}:00 - ${b.end_hour}:00</div>
                    <div style="font-size: 16px;">${b.name}</div>
                </div>
            `).join('');
        }

        async function addBooking() {
            const date = document.getElementById('bookDate').value;
            const name = document.getElementById('bookName').value;
            const start_hour = document.getElementById('bookStart').value;
            const end_hour = document.getElementById('bookEnd').value;
            
            if (!date || !name || !start_hour || !end_hour) { alert("Vyplň všechny údaje k rezervaci!"); return; }

            const { error } = await supabase.from('bookings').insert([{ date, name, start_hour, end_hour }]);
            if (!error) {
                document.getElementById('bookName').value = '';
                document.getElementById('bookStart').value = '';
                document.getElementById('bookEnd').value = '';
                loadBookings(); // Okamžitý refresh
            } else alert("Chyba: " + error.message);
        }

        // --- DATABÁZOVÁ LOGIKA: NÁJEM ---
        async function loadRent() {
            const { data, error } = await supabase.from('rent').select('*').order('id', { ascending: false }).limit(1);
            const status = document.getElementById('rentStatus');
            if (error || data.length === 0) { status.innerHTML = 'Data o nájmu nenalezena. (Spusť SQL příkaz)'; return; }
            
            const r = data[0];
            status.innerHTML = `
                <div class="list-item">
                    <span>Jenda</span> 
                    ${r.jenda_paid ? '<strong style="color:var(--primary)">ZAPLACENO</strong>' : `<button class="status-btn" onclick="payRent('jenda_paid')">Označit</button>`}
                </div>
                <div class="list-item">
                    <span>Maty</span> 
                    ${r.maty_paid ? '<strong style="color:var(--primary)">ZAPLACENO</strong>' : `<button class="status-btn" onclick="payRent('maty_paid')">Označit</button>`}
                </div>
                <div class="list-item">
                    <span>Dominik</span> 
                    ${r.dominik_paid ? '<strong style="color:var(--primary)">ZAPLACENO</strong>' : `<button class="status-btn" onclick="payRent('dominik_paid')">Označit</button>`}
                </div>
            `;
        }

        async function payRent(person) {
            const { data } = await supabase.from('rent').select('id').order('id', { ascending: false }).limit(1);
            if (data.length > 0) {
                const updateObj = {};
                updateObj[person] = true;
                await supabase.from('rent').update(updateObj).eq('id', data[0].id);
                loadRent(); // Okamžitý refresh
            }
        }

        // Automatické načtení dat při startu aplikace
        window.onload = () => {
            loadPurchases();
            loadBookings();
            loadRent();
        }
    </script>
</body>
</html>
